name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: macos-26
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: SwiftLint
        run: |
          brew install swiftlint
          swiftlint lint --strict --config .swiftlint.yml

  test-packages:
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: StockTrackerDomain
        run: swift test --package-path StockTrackerDomain
      - name: StockSocketKit
        run: swift test --package-path StockSocketKit

  test-app:
    runs-on: macos-26
    timeout-minutes: 60
    env:
      XCODE_DESTINATION: platform=iOS Simulator,name=iPhone 17
    steps:
      - uses: actions/checkout@v4
      - name: Xcode tests
        run: |
          set -euo pipefail
          xcodebuild test \
            -project StockTracker.xcodeproj \
            -scheme StockTracker \
            -sdk iphonesimulator \
            -destination "${XCODE_DESTINATION}" \
            -quiet
