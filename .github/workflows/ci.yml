name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: SwiftLint
        run: brew install swiftlint && swiftlint lint --strict --config .swiftlint.yml

  test-packages:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: SPM StockTrackerDomain
        run: swift test --package-path StockTrackerDomain

      - name: SPM StockSocketKit
        run: swift test --package-path StockSocketKit

  test-app:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Xcode tests
        run: |
          set -euo pipefail
          # Resolve a destination Xcode actually supports (simctl UDIDs can disagree with xcodebuild on CI images).
          SIM_DEST="$(python3 <<'PY'
          import re
          import subprocess

          proc = subprocess.run(
              [
                  "xcodebuild",
                  "-project",
                  "StockTracker.xcodeproj",
                  "-scheme",
                  "StockTracker",
                  "-showdestinations",
              ],
              capture_output=True,
              text=True,
          )
          blob = proc.stdout + proc.stderr
          dest = ""
          for line in blob.splitlines():
              if "platform:iOS Simulator" not in line:
                  continue
              if "iPhone" not in line:
                  continue
              m = re.search(r"\bid:([0-9A-Fa-f-]+)\b", line)
              if not m:
                  continue
              dest = f"platform=iOS Simulator,id={m.group(1)}"
              break
          print(dest, end="")
          PY
          )"
          if [ -z "${SIM_DEST}" ]; then
            echo "No iPhone iOS Simulator destination from xcodebuild -showdestinations." >&2
            exit 1
          fi
          echo "Using -destination ${SIM_DEST}" >&2
          xcodebuild \
            -project StockTracker.xcodeproj \
            -scheme StockTracker \
            -destination "${SIM_DEST}" \
            -quiet \
            test
